[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "trainforge"
version = "0.1.0"
description = "A production-ready, modular AI fine-tuning toolkit."
authors = [{name = "Abhishek", email = "abhishek@example.com"}] # Update email if needed
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.9"

[project.urls]
Homepage = "https://github.com/abhishek-dev-code/trainforge"
Repository = "https://github.com/abhishek-dev-code/trainforge"

dependencies = [
    "torch>=2.0.0",
    "transformers>=4.38.0",
    "peft>=0.7.0",
    "accelerate>=0.27.0",
    "bitsandbytes>=0.42.0",
    "trl>=0.7.11",
    "PyMuPDF>=1.23.0",
    "pandas>=2.0.0"
]

[project.scripts]
trainforge = "trainforge.__main__:main"
